```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieFlix</title>

  <link rel="stylesheet" href="style.css"/>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />
</head>

<body>

  <!-- Navbar -->

  <nav class="navbar">
    <div class="logo">MovieFlix</div>

    <ul class="nav-links">
      <li>Home</li>
      <li>Movies</li>
      <li>Series</li>
      <li>Trending</li>
    </ul>

    <button class="signin-btn">Sign In</button>
  </nav>

  <!-- Hero Section -->

  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Unlimited Movies, TV Shows & More.</h1>

      <p>
        Watch horror, romance, sci-fi, anime, action and more.
      </p>

      <div class="hero-buttons">
        <button class="watch-btn">
          <i class="fa-solid fa-play"></i> Watch Now
        </button>

        <button class="info-btn">
          More Info
        </button>
      </div>
    </div>

  </section>

  <!-- Categories -->

  <section class="categories">

    <h2>Popular Categories</h2>

    <div class="card-container">

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop" />
        <h3>Sci-Fi</h3>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1200&auto=format&fit=crop" />
        <h3>Horror</h3>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1200&auto=format&fit=crop" />
        <h3>Romance</h3>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1513106580091-1d82408b8cd6?q=80&w=1200&auto=format&fit=crop" />
        <h3>Adventure</h3>
      </div>

    </div>

  </section>

</body>
</html>
```
